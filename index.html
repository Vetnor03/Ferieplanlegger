<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ferieplanlegger 🇳🇴</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #111827;
      --vac: #bbf7d0;
      --weekend: #e5e7eb;
      --holiday: #ddd6fe;
      --special: #fecaca;
      --border: #e5e7eb;
      --selected: #86efac;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 14px calc(120px + env(safe-area-inset-bottom));
    }
    h1 { font-size: 1.9rem; margin: 10px 0 6px; }
    h2 { margin: 0 0 10px; font-size: 1.2rem; }
    .subtitle { color: var(--muted); margin-top: 0; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
    }
    .grid { display: grid; gap: 10px; }
    label { font-weight: 700; font-size: 0.95rem; margin-bottom: 6px; display: block; }
    .help { color: var(--muted); font-size: 0.82rem; margin-top: -2px; margin-bottom: 8px; }
    input, select, textarea, button { width: 100%; font: inherit; padding: 12px; border-radius: 12px; border: 1px solid #d1d5db; }
    textarea { min-height: 90px; resize: vertical; }
    button { background: var(--accent); color: white; border: none; font-weight: 700; }
    .inline { display: flex; align-items: start; gap: 10px; }
    .inline input { width: auto; margin-top: 2px; }
    .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .box { background: #f9fafb; border-radius: 12px; padding: 10px; border: 1px solid var(--border); }
    .box strong { font-size: 1.2rem; display:block; }
    .period { border-left: 4px solid #111827; }
    .reason { font-size: 0.85rem; color: #065f46; background: #ecfdf5; padding: 6px 10px; border-radius: 999px; display: inline-block; }
    .timeline { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .pill { padding: 5px 8px; border-radius: 999px; font-size: 0.75rem; }
    .vacation { background: var(--vac); }
    .weekend { background: var(--weekend); }
    .holiday { background: var(--holiday); }
    .special { background: var(--special); }
    .legend { display: flex; flex-wrap: wrap; gap: 8px; font-size: 0.8rem; color: var(--muted); }
    .holiday-row { display:flex; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .calendar-header { display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .calendar-grid { display:grid; grid-template-columns: repeat(7,1fr); gap:4px; }
    .calendar-day {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 4px;
      text-align: center;
      background: white;
      cursor: pointer;
      min-height: 44px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #1f2937;
    }
    .calendar-day.empty { visibility: hidden; cursor: default; }
    .calendar-day.weekend { background: #f3f4f6; color: #4b5563; }
    .calendar-day.holiday { background: #ede9fe; color: #4338ca; }
    .calendar-day.special { background: #fee2e2; color: #991b1b; }
    .calendar-day.selected { outline: 2px solid #16a34a; background: var(--selected); color: #065f46; }
    .calendar-day small { display:block; color: var(--muted); font-size:0.7rem; }
    .weekday-head { text-align:center; color: var(--muted); font-size:0.75rem; margin-bottom:4px; }
    .calendar-actions { display:flex; gap:8px; flex-wrap: wrap; }
    .calendar-actions button { width:auto; padding:8px 12px; border-radius:10px; }
    .calendar-actions .ghost { background:#fff; color:var(--text); border:1px solid var(--border); }
    .month-nav { display:flex; align-items:center; justify-content:space-between; gap:8px; margin: 8px 0; }
    .month-nav button { width:auto; padding:8px 12px; border-radius:10px; }
    .month-label { font-weight:700; text-transform: capitalize; }
    @media (min-width: 740px) {
      .app { padding: 24px 20px calc(36px + env(safe-area-inset-bottom)); }
      .summary { grid-template-columns: repeat(3, 1fr); }
      .form-cols { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    }
  </style>
</head>
<body>
<main class="app">
  <h1>Ferieplanlegger 🇳🇴</h1>
  <p class="subtitle">Bruk alle feriedagene smartest mulig – med norske helligdager og dine egne ønsker først.</p>

  <section class="card">
    <div class="grid">
      <div class="form-cols">
        <div>
          <label for="year">År</label>
          <select id="year"></select>
        </div>
        <div>
          <label for="days">Tilgjengelige feriedager</label>
          <input id="days" type="number" min="1" max="60" value="25" />
        </div>
      </div>

      <div>
        <label for="season">Ønsket periodefilter</label>
        <select id="season">
          <option value="all">Hele året</option>
          <option value="spring">Vår (mars–mai)</option>
          <option value="summer">Sommer (juni–august)</option>
          <option value="autumn">Høst (september–november)</option>
          <option value="xmas">Jul/nyttår</option>
          <option value="custom">Egendefinert datoperiode</option>
        </select>
      </div>

      <div class="form-cols" id="customRange" style="display:none;">
        <div><label for="customStart">Fra dato</label><input id="customStart" type="date" /></div>
        <div><label for="customEnd">Til dato</label><input id="customEnd" type="date" /></div>
      </div>

      <div>
        <label for="preferred">Foretrukne ferieperioder (valgfritt)</label>
        <p class="help">Klikk i kalenderen under for å markere dager. Tekstfeltet fylles automatisk, men kan også redigeres manuelt.</p>
        <textarea id="preferred" placeholder="2026-07-06 to 2026-07-17\n2026-12-24 to 2026-12-31"></textarea>
      </div>

      <section class="card" style="margin:0;">
        <div class="calendar-header">
          <h2 style="margin:0;">Velg ferie i kalender</h2>
          <span id="selectedCount" class="muted">0 dager valgt</span>
        </div>
        <div class="calendar-actions">
          <button class="ghost" type="button" onclick="selectWholeMonth()">Velg hele måneden</button>
          <button class="ghost" type="button" onclick="clearSelectedDays()">Fjern markering</button>
        </div>
        <div class="month-nav">
          <button class="ghost" type="button" onclick="changePickerMonth(-1)">← Forrige</button>
          <span id="pickerMonthLabel" class="month-label"></span>
          <button class="ghost" type="button" onclick="changePickerMonth(1)">Neste →</button>
        </div>
        <div id="calendar" style="margin-top:10px;"></div>
      </section>

      <label class="inline"><input id="includeSpecial" type="checkbox" checked />
        <span>Regn julaften (24.12) og nyttårsaften (31.12) som nyttige spesialdager</span>
      </label>

      <button onclick="runPlanner()">Lag ferieplan</button>
    </div>
  </section>

  <section id="result"></section>
</main>
<script>
const dayNames=["søn","man","tir","ons","tor","fre","lør"]; const monthNames=["jan","feb","mar","apr","mai","jun","jul","aug","sep","okt","nov","des"];
const yearSel=document.getElementById('year'); const nowY=new Date().getFullYear(); for(let y=nowY;y<=nowY+3;y++){yearSel.add(new Option(String(y),String(y)));}
let pickerMonth = new Date().getMonth();
const season=document.getElementById('season'); season.addEventListener('change',()=>document.getElementById('customRange').style.display=season.value==='custom'?'grid':'none');
const dateKey=d=>d.toISOString().slice(0,10); const addDays=(d,n)=>{const x=new Date(d); x.setDate(x.getDate()+n); return x;}; const isWeekend=d=>d.getDay()===0||d.getDay()===6;
const selectedDates = new Set();

function easterSunday(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,da);}
function holidaysNO(year, includeSpecial){const e=easterSunday(year);const holidays=[{date:new Date(year,0,1),name:'Nyttårsdag'},{date:addDays(e,-3),name:'Skjærtorsdag'},{date:addDays(e,-2),name:'Langfredag'},{date:addDays(e,0),name:'1. påskedag'},{date:addDays(e,1),name:'2. påskedag'},{date:new Date(year,4,1),name:'Arbeidernes dag'},{date:new Date(year,4,17),name:'Grunnlovsdag (17. mai)'},{date:addDays(e,39),name:'Kristi himmelfartsdag'},{date:addDays(e,49),name:'1. pinsedag'},{date:addDays(e,50),name:'2. pinsedag'},{date:new Date(year,11,25),name:'1. juledag'},{date:new Date(year,11,26),name:'2. juledag'}];
if(includeSpecial){holidays.push({date:new Date(year,11,24),name:'Julaften (spesialdag)'},{date:new Date(year,11,31),name:'Nyttårsaften (spesialdag)'});} const map={};holidays.forEach(h=>map[dateKey(h.date)]=h.name); return {holidays,map};}
function inFilter(d, year){const s=season.value; if(s==='all') return d.getFullYear()===year; if(s==='spring') return d>=new Date(year,2,1)&&d<=new Date(year,4,31); if(s==='summer') return d>=new Date(year,5,1)&&d<=new Date(year,7,31); if(s==='autumn') return d>=new Date(year,8,1)&&d<=new Date(year,10,30); if(s==='xmas') return d>=new Date(year,11,15)&&d<=new Date(year+1,0,10); if(s==='custom'){const a=new Date(document.getElementById('customStart').value); const b=new Date(document.getElementById('customEnd').value); if(isNaN(a)||isNaN(b)) return false; return d>=a&&d<=b;} return true;}
function evaluatePeriod(start,end,map,reason){let used=0,total=0;const days=[];for(let d=new Date(start);d<=end;d=addDays(d,1)){const k=dateKey(d),h=map[k],w=isWeekend(d); total++; let type='vacation',label='Ferie'; if(h){type=h.includes('spesialdag')?'special':'holiday';label=h;} else if(w){type='weekend';label='Helg';} else used++; days.push({date:new Date(d),type,label});}
return {start,end,used,total,gained:total-used,score:total/Math.max(used,1),days,reason};}

function selectedDatesToPeriods(year,map){
  const list=[...selectedDates].map(k=>new Date(k)).filter(d=>d.getFullYear()===year).sort((a,b)=>a-b);
  if(!list.length) return [];
  const periods=[];
  let start=list[0], prev=list[0];
  for(let i=1;i<list.length;i++){
    if((list[i]-prev)/(1000*60*60*24)===1){ prev=list[i]; continue; }
    periods.push(evaluatePeriod(start,prev,map,'Valgt i kalender'));
    start=list[i]; prev=list[i];
  }
  periods.push(evaluatePeriod(start,prev,map,'Valgt i kalender'));
  return periods;
}
function writeSelectedToTextarea(){
  const year=Number(document.getElementById('year').value);
  const {map}=holidaysNO(year,document.getElementById('includeSpecial').checked);
  const text=selectedDatesToPeriods(year,map).map(p=>`${dateKey(p.start)} to ${dateKey(p.end)}`).join('\n');
  document.getElementById('preferred').value=text;
  document.getElementById('selectedCount').textContent=`${selectedDates.size} dager valgt`;
}
function parsePreferred(year,map){
const txt=document.getElementById('preferred').value.trim();
if(!txt) return {periods:selectedDatesToPeriods(year,map),errors:[]};
const errors=[],periods=[];
txt.split(/\n+/).forEach((line,i)=>{const m=line.trim().match(/(\d{4}-\d{2}-\d{2})\s+to\s+(\d{4}-\d{2}-\d{2})/i); if(!m){errors.push(`Linje ${i+1} har feil format.`); return;} const a=new Date(m[1]),b=new Date(m[2]); if(isNaN(a)||isNaN(b)||a>b){errors.push(`Linje ${i+1} har ugyldig datointervall.`); return;} periods.push(evaluatePeriod(a,b,map,'Din ønskede periode'));}); periods.sort((a,b)=>a.start-b.start); return {periods,errors};}
function overlaps(p,set){return p.days.some(d=>set.has(dateKey(d.date)));}
function plan(year,available){const includeSpecial=document.getElementById('includeSpecial').checked; const {holidays,map}=holidaysNO(year,includeSpecial); const usedDates=new Set(); const picked=[];
const preferred=parsePreferred(year,map); let used=0;
preferred.periods.forEach(p=>{if(!overlaps(p,usedDates)&&used+p.used<=available){picked.push(p); p.days.forEach(d=>usedDates.add(dateKey(d.date))); used+=p.used;}});
let left=available-used;
const candidates=[]; const start=new Date(year,0,1),end=new Date(year,11,31);
for(let s=new Date(start);s<=end;s=addDays(s,1)){if(!inFilter(s,year)) continue; for(let len=4;len<=18;len++){const e=addDays(s,len-1); if(!inFilter(e,year)) continue; const p=evaluatePeriod(s,e,map,'Smart broperiode'); if(p.used>0&&p.used<=left&&p.gained>=2) candidates.push(p);}}
const monthWeight = (m) => (m >= 6 ? 0.2 : 0);
const avgMonth = (periods) => periods.length ? periods.reduce((sum,p)=>sum+((p.start.getMonth()+p.end.getMonth())/2),0)/periods.length : 5.5;
for(;;){
  let best=null;
  const currentAvg=avgMonth(picked);
  for(const c of candidates){
    if(c.used>left||overlaps(c,usedDates)) continue;
    const cMid=(c.start.getMonth()+c.end.getMonth())/2;
    const spreadBoost=Math.max(0,cMid-currentAvg)*0.03;
    const balancedScore=c.score+monthWeight(cMid)+spreadBoost+(c.gained*0.01)-(c.used*0.005);
    if(!best||balancedScore>best.balancedScore||(balancedScore===best.balancedScore&&cMid>best.cMid)){
      best={period:c,balancedScore,cMid};
    }
  }
  if(!best) break;
  const c=best.period;
  picked.push(c);
  c.days.forEach(d=>usedDates.add(dateKey(d.date)));
  left-=c.used;
  if(left===0) break;
}
if(left>0){const fillers=[]; for(let s=new Date(start);s<=end;s=addDays(s,1)){if(!inFilter(s,year)) continue; for(let len=left;len<=Math.min(24,left+10);len++){const e=addDays(s,len-1); if(!inFilter(e,year)) continue; const p=evaluatePeriod(s,e,map,'Utfylling for å bruke restdager'); if(p.used===left&&!overlaps(p,usedDates)) fillers.push(p);}}
fillers.sort((a,b)=>b.total-a.total||b.gained-a.gained); if(fillers[0]){const f=fillers[0]; picked.push(f); f.days.forEach(d=>usedDates.add(dateKey(d.date))); left=0;}}
if(left>0){for(let d=new Date(year,5,15);d<=end&&left>0;d=addDays(d,1)){if(!inFilter(d,year)) continue; const p=evaluatePeriod(d,d,map,'Enkelt-dag for å bruke alle feriedager'); if(p.used===1&&!overlaps(p,usedDates)){picked.push(p); usedDates.add(dateKey(d)); left--;}}}
const totalUsed=picked.reduce((s,p)=>s+p.used,0),totalFree=picked.reduce((s,p)=>s+p.total,0);
return {picked,left,totalUsed,totalFree,totalGained:totalFree-totalUsed,eff:totalFree/Math.max(totalUsed,1),holidays,errors:preferred.errors};}
const formatDate=d=>`${d.getDate()}. ${monthNames[d.getMonth()]} ${d.getFullYear()}`;
function runPlanner(){const year=Number(document.getElementById('year').value),days=Number(document.getElementById('days').value),out=document.getElementById('result'); if(!days||days<1){out.innerHTML='<section class="card">Legg inn minst 1 feriedag.</section>'; return;} const res=plan(year,days);
const resultDates=new Set(res.picked.flatMap(p=>p.days.map(d=>dateKey(d.date))));
out.innerHTML=`<section class="card"><h2>Resultat</h2><p class="muted">Planen prøver alltid å bruke alle feriedagene dine først med ønskede perioder, deretter smarte broperioder og til slutt utfylling.</p>
<div class="summary"><div class="box"><strong>${days}</strong>Tilgjengelige feriedager</div><div class="box"><strong>${res.totalUsed}</strong>Feriedager brukt</div><div class="box"><strong>${res.left}</strong>Ubrukte feriedager</div><div class="box"><strong>${res.totalFree}</strong>Totale kalenderdager fri</div><div class="box"><strong>${res.totalGained}</strong>Ekstra dager fra helg/helligdag</div><div class="box"><strong>${res.eff.toFixed(2)}x</strong>Effektivitet</div></div>
${res.errors.length?`<p class="muted">Merknad: ${res.errors.join(' ')}</p>`:''}
<div class="legend"><span class="pill vacation">Feriedag</span><span class="pill weekend">Helg</span><span class="pill holiday">Helligdag</span><span class="pill special">Spesialdag</span></div></section>
${res.picked.map((p,i)=>`<section class="card period"><h2>${i+1}. ${formatDate(p.start)} – ${formatDate(p.end)}</h2><span class="reason">${p.reason}</span><p class="muted">${p.used} feriedager brukt • ${p.total} dager fri • ${p.gained} ekstra dager</p><div class="timeline">${p.days.map(d=>`<span class="pill ${d.type}">${dayNames[d.date.getDay()]} ${d.date.getDate()}. ${monthNames[d.date.getMonth()]}</span>`).join('')}</div></section>`).join('')}
<section class="card"><h2>Norske helligdager ${year}</h2>${res.holidays.sort((a,b)=>a.date-b.date).map(h=>`<div class="holiday-row"><strong>${formatDate(h.date)}</strong><span>${h.name}</span></div>`).join('')}</section>`;
renderResultCalendar(year, resultDates);
}

function renderResultCalendar(year, resultDates){
  const {map}=holidaysNO(year,document.getElementById('includeSpecial').checked);
  const html = Array.from({length:12},(_,month)=>{
    const first=new Date(year,month,1);
    const last=new Date(year,month+1,0);
    const offset=(first.getDay()+6)%7;
    let body='<div class="calendar-grid">'+['man','tir','ons','tor','fre','lør','søn'].map(d=>`<div class="weekday-head">${d}</div>`).join('')+'</div><div class="calendar-grid">';
    for(let i=0;i<offset;i++) body += '<div class="calendar-day empty"></div>';
    for(let day=1;day<=last.getDate();day++){
      const d=new Date(year,month,day); const key=dateKey(d); const holiday=map[key];
      const cls=['calendar-day'];
      if(isWeekend(d)) cls.push('weekend');
      if(holiday) cls.push(holiday.includes('spesialdag') ? 'special' : 'holiday');
      if(resultDates.has(key)) cls.push('selected');
      body += `<div class="${cls.join(' ')}">${day}</div>`;
    }
    body+='</div>';
    return `<section class="card" style="margin-bottom:8px;"><h3 style="margin:0 0 8px;">${monthNames[month]} ${year}</h3>${body}</section>`;
  }).join('');
  document.getElementById('result').innerHTML += `<section class="card"><h2>Kalenderoversikt for resultat</h2><p class="muted">Markerte dager viser hele planen din i kalenderformat.</p>${html}</section>`;
}

function renderCalendar(){
  const year=Number(document.getElementById('year').value);
  const includeSpecial=document.getElementById('includeSpecial').checked;
  const {map}=holidaysNO(year,includeSpecial);
  const root=document.getElementById('calendar');
  const month=((pickerMonth%12)+12)%12;
  document.getElementById('pickerMonthLabel').textContent=`${monthNames[month]} ${year}`;
  const first=new Date(year,month,1);
  const last=new Date(year,month+1,0);
  const offset=(first.getDay()+6)%7;
  let html = '<div class="calendar-grid">'+['man','tir','ons','tor','fre','lør','søn'].map(d=>`<div class="weekday-head">${d}</div>`).join('')+'</div>';
  html += '<div class="calendar-grid">';
  for(let i=0;i<offset;i++) html += '<div class="calendar-day empty"></div>';
  for(let day=1;day<=last.getDate();day++){
    const d=new Date(year,month,day); const key=dateKey(d); const holiday=map[key];
    const cls=['calendar-day'];
    if(isWeekend(d)) cls.push('weekend');
    if(holiday) cls.push(holiday.includes('spesialdag') ? 'special' : 'holiday');
    if(selectedDates.has(key)) cls.push('selected');
    html += `<button type="button" class="${cls.join(' ')}" onclick="toggleDate('${key}')">${day}</button>`;
  }
  html += '</div>';
  root.innerHTML=html;
  writeSelectedToTextarea();
}
function toggleDate(key){ if(selectedDates.has(key)) selectedDates.delete(key); else selectedDates.add(key); renderCalendar(); }
function changePickerMonth(delta){ pickerMonth=(pickerMonth+delta+12)%12; renderCalendar(); }
function selectWholeMonth(){ const year=Number(document.getElementById('year').value); const month=((pickerMonth%12)+12)%12; const last=new Date(year,month+1,0).getDate(); for(let i=1;i<=last;i++) selectedDates.add(dateKey(new Date(year,month,i))); renderCalendar(); }
function clearSelectedDays(){ selectedDates.clear(); renderCalendar(); }

yearSel.addEventListener('change',()=>{pickerMonth=0; clearSelectedDays(); renderCalendar(); runPlanner();});
document.getElementById('includeSpecial').addEventListener('change',()=>{renderCalendar(); runPlanner();});
renderCalendar();
runPlanner();
</script>
</body>
</html>
