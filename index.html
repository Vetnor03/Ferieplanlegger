<body>
  <main class="app">
    <h1>Ferieplanlegger 🇳🇴</h1>
    <p class="subtitle">Finn ut hvordan du kan få mest mulig fri ut av feriedagene dine.</p>

    <section class="card">
      <label for="year">År</label>
      <select id="year"></select>

      <label for="days">Hvor mange feriedager har du?</label>
      <input id="days" type="number" min="1" max="60" value="25" />

      <button onclick="runPlanner()">Finn beste ferieperioder</button>
    </section>

    <section id="result"></section>
  </main>

  <script>
    const dayNames = ["søn", "man", "tir", "ons", "tor", "fre", "lør"];
    const monthNames = ["jan", "feb", "mar", "apr", "mai", "jun", "jul", "aug", "sep", "okt", "nov", "des"];

    const yearSelect = document.getElementById("year");
    const currentYear = new Date().getFullYear();

    for (let y = currentYear; y <= currentYear + 3; y++) {
      const option = document.createElement("option");
      option.value = y;
      option.textContent = y;
      yearSelect.appendChild(option);
    }

    function dateKey(date) {
      return date.toISOString().slice(0, 10);
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function formatDate(date) {
      return `${date.getDate()}. ${monthNames[date.getMonth()]}`;
    }

    function isWeekend(date) {
      return date.getDay() === 0 || date.getDay() === 6;
    }

    function easterSunday(year) {
      const a = year % 19;
      const b = Math.floor(year / 100);
      const c = year % 100;
      const d = Math.floor(b / 4);
      const e = b % 4;
      const f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3);
      const h = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4);
      const k = c % 4;
      const l = (32 + 2 * e + 2 * i - h - k) % 7;
      const m = Math.floor((a + 11 * h + 22 * l) / 451);
      const month = Math.floor((h + l - 7 * m + 114) / 31);
      const day = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(year, month - 1, day);
    }

    function norwegianHolidays(year) {
      const easter = easterSunday(year);

      const holidays = [
        { date: new Date(year, 0, 1), name: "Nyttårsdag" },
        { date: addDays(easter, -3), name: "Skjærtorsdag" },
        { date: addDays(easter, -2), name: "Langfredag" },
        { date: addDays(easter, 0), name: "1. påskedag" },
        { date: addDays(easter, 1), name: "2. påskedag" },
        { date: new Date(year, 4, 1), name: "Arbeidernes dag" },
        { date: new Date(year, 4, 17), name: "17. mai" },
        { date: addDays(easter, 39), name: "Kristi himmelfartsdag" },
        { date: addDays(easter, 49), name: "1. pinsedag" },
        { date: addDays(easter, 50), name: "2. pinsedag" },
        { date: new Date(year, 11, 25), name: "1. juledag" },
        { date: new Date(year, 11, 26), name: "2. juledag" }
      ];

      const map = {};
      holidays.forEach(h => {
        map[dateKey(h.date)] = h.name;
      });

      return { holidays, map };
    }

    function countVacationDays(start, end, holidayMap) {
      let used = 0;
      let total = 0;
      let holidays = 0;
      let weekends = 0;
      let days = [];

      for (let d = new Date(start); d <= end; d = addDays(d, 1)) {
        const key = dateKey(d);
        const weekend = isWeekend(d);
        const holiday = holidayMap[key];

        total++;

        if (weekend) weekends++;
        else if (holiday) holidays++;
        else used++;

        days.push({
          date: new Date(d),
          type: weekend ? "weekend" : holiday ? "holiday" : "vacation",
          label: holiday || (weekend ? "Helg" : "Ferie")
        });
      }

      return {
        start,
        end,
        used,
        total,
        gained: total - used,
        weekends,
        holidays,
        days,
        score: total / Math.max(used, 1)
      };
    }

    function findBestPeriods(year, availableDays) {
      const { map } = norwegianHolidays(year);
      const candidates = [];

      const startDate = new Date(year, 0, 1);
      const endDate = new Date(year, 11, 31);

      for (let start = new Date(startDate); start <= endDate; start = addDays(start, 1)) {
        for (let length = 3; length <= 24; length++) {
          const end = addDays(start, length - 1);
          if (end.getFullYear() > year && end.getMonth() > 0) continue;

          const period = countVacationDays(start, end, map);

          if (period.used > 0 && period.used <= availableDays && period.total >= 5) {
            candidates.push(period);
          }
        }
      }

      candidates.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        if (b.gained !== a.gained) return b.gained - a.gained;
        return b.total - a.total;
      });

      const selected = [];
      let usedDates = new Set();
      let daysLeft = availableDays;

      for (const candidate of candidates) {
        if (candidate.used > daysLeft) continue;

        const overlaps = candidate.days.some(d => usedDates.has(dateKey(d.date)));
        if (overlaps) continue;

        selected.push(candidate);
        daysLeft -= candidate.used;
        candidate.days.forEach(d => usedDates.add(dateKey(d.date)));

        if (selected.length >= 6 || daysLeft <= 0) break;
      }

      return selected;
    }

    function runPlanner() {
      const year = Number(document.getElementById("year").value);
      const availableDays = Number(document.getElementById("days").value);
      const result = document.getElementById("result");

      if (!availableDays || availableDays < 1) {
        result.innerHTML = `<section class="card">Skriv inn minst 1 feriedag.</section>`;
        return;
      }

      const periods = findBestPeriods(year, availableDays);
      const holidayData = norwegianHolidays(year);

      const totalUsed = periods.reduce((sum, p) => sum + p.used, 0);
      const totalFree = periods.reduce((sum, p) => sum + p.total, 0);
      const totalGained = totalFree - totalUsed;

      result.innerHTML = `
        <section class="card">
          <h2>Resultat for ${year}</h2>
          <p class="small">Basert på norske helligdager, helger og hvor mange feriedager du har tilgjengelig.</p>

          <div class="summary">
            <div class="summary-box">
              <strong>${totalUsed}</strong>
              <span>feriedager brukt</span>
            </div>
            <div class="summary-box">
              <strong>${totalFree}</strong>
              <span>totale fridager</span>
            </div>
            <div class="summary-box">
              <strong>${totalGained}</strong>
              <span>ekstra dager tjent</span>
            </div>
          </div>
        </section>

        ${periods.map((p, index) => `
          <section class="card period">
            <div class="gain">${p.score.toFixed(1)}x utnyttelse</div>
            <h3>${index + 1}. ${formatDate(p.start)} – ${formatDate(p.end)}</h3>
            <div class="meta">
              Bruk ${p.used} feriedag${p.used === 1 ? "" : "er"} og få ${p.total} dager fri.<br>
              Du tjener ${p.gained} ekstra dag${p.gained === 1 ? "" : "er"} fra helger og helligdager.
            </div>

            <div class="dates">
              ${p.days.map(d => `
                <span class="pill ${d.type}">
                  ${dayNames[d.date.getDay()]} ${d.date.getDate()}. ${monthNames[d.date.getMonth()]}
                </span>
              `).join("")}
            </div>
          </section>
        `).join("")}

        <section class="card">
          <h2>Helligdager i ${year}</h2>
          <div class="holiday-list">
            ${holidayData.holidays
              .sort((a, b) => a.date - b.date)
              .map(h => `
                <div class="holiday-row">
                  <strong>${formatDate(h.date)}</strong>
                  <span>${h.name}</span>
                </div>
              `).join("")}
          </div>
        </section>
      `;
    }

    runPlanner();
  </script>
</body>
</html>
